name: Lint & Build Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "/root/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run type generation
        run: bun run typegen

      - name: Build check
        run: bun run build
