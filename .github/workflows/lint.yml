name: Lint & Build Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        run: |
          mkdir -p /tmp/repo
          cd /tmp/repo
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin ${{ github.event.pull_request.head.ref }} --depth=1
          git checkout FETCH_HEAD
          cp -r . ${{ github.workspace }}

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="/root/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          export PATH="/root/.bun/bin:$PATH"
          bun install --frozen-lockfile

      - name: Run ESLint
        run: |
          export PATH="/root/.bun/bin:$PATH"
          bun run lint || echo "Linting issues found"

      - name: Run type generation
        run: |
          export PATH="/root/.bun/bin:$PATH"
          bun run typegen || echo "Type generation issues found"

      - name: Build check
        run: |
          export PATH="/root/.bun/bin:$PATH"
          bun run build || echo "Build issues found"
